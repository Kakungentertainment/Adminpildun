<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BolaStream - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b1120; }
    </style>
</head>
<body class="text-slate-100 min-height-screen pb-12">

    <header class="border-b border-slate-800 bg-slate-900/80 sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-lg font-bold text-white">BolaStream <span class="text-emerald-400">Admin</span></h1>
            <div class="text-xs text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full bg-emerald-500/10">Sistem Aktif</div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                <h3 class="text-sm font-semibold text-white mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-gear text-emerald-400"></i> Pengaturan Siaran
                </h3>
                
                <form id="match-form" onsubmit="handleSubmit(event)" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">Link .m3u8</label>
                        <input type="url" id="match-m3u8" required placeholder="https://..." 
                            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:border-emerald-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">Status Laga</label>
                        <select id="match-status" onchange="toggleCustomStatusInput()" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:border-emerald-500 outline-none">
                            <option value="LIVE STREAMING">LIVE STREAMING</option>
                            <option value="LIVE UPCOMING">LIVE UPCOMING</option>
                            <option value="CUSTOM">Silahkan ketik...</option>
                        </select>
                        <input type="text" id="match-status-custom" placeholder="Ketik status kustom di sini..." 
                            class="hidden mt-2 w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:border-emerald-500 outline-none">
                    </div>

                    <button type="submit" id="submit-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-semibold py-3 rounded-xl transition-all text-sm">
                        Simpan Perubahan
                    </button>
                </form>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-xl">
                <h3 class="text-sm font-semibold text-white mb-3">Preview Player</h3>
                <div class="aspect-video bg-black rounded-xl overflow-hidden border border-slate-800">
                    <video id="preview-video" controls class="w-full h-full"></video>
                </div>
            </div>
        </div>
    </main>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwOcPqHXEKv0MBN-dPr_XPj6PZTd3ql0Oml77xcFAKg8n1-0Cj3QFhJPBnihCKyTlv2-w/exec';

        // Load data saat pertama kali buka
        window.onload = fetchMatches;

        async function fetchMatches() {
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const data = await response.json();
                // Asumsi data diambil dari baris pertama (index 0)
                const item = Array.isArray(data) ? data[0] : data;
                
                document.getElementById('match-m3u8').value = item.m3u8 || '';
                
                const statusSelect = document.getElementById('match-status');
                const customInput = document.getElementById('match-status-custom');
                
                if (item.status === 'LIVE STREAMING' || item.status === 'LIVE UPCOMING') {
                    statusSelect.value = item.status;
                    customInput.classList.add('hidden');
                } else {
                    statusSelect.value = 'CUSTOM';
                    customInput.value = item.status || '';
                    customInput.classList.remove('hidden');
                }
                
                playPreview(item.m3u8);
            } catch (e) { console.error("Gagal ambil data"); }
        }

        function toggleCustomStatusInput() {
            const statusSelect = document.getElementById('match-status');
            const customInput = document.getElementById('match-status-custom');
            if (statusSelect.value === 'CUSTOM') {
                customInput.classList.remove('hidden');
                customInput.required = true;
                customInput.focus();
            } else {
                customInput.classList.add('hidden');
                customInput.required = false;
            }
        }

        function getStatusValue() {
            const statusSelect = document.getElementById('match-status');
            if (statusSelect.value === 'CUSTOM') {
                return document.getElementById('match-status-custom').value;
            }
            return statusSelect.value;
        }

        function playPreview(url) {
            const video = document.getElementById('preview-video');
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
            } else { video.src = url; }
        }

        async function handleSubmit(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Menyimpan...";
            
            const payload = {
                action: "update",
                m3u8: document.getElementById('match-m3u8').value,
                status: getStatusValue()
            };

            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            
            alert("Data Berhasil Disimpan!");
            btn.innerText = "Simpan Perubahan";
        }
    </script>
</body>
</html>
