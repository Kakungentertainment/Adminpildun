<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MbahSports - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Tambahkan pustaka DASH.js untuk format .mpd -->
    <script src="https://cdn.jsdelivr.net/npm/dashjs@latest/dist/dash.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b1120; }
    </style>
</head>
<body class="text-slate-100 min-h-screen pb-12">

    <header class="border-b border-slate-800 bg-slate-900/80 sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-lg font-bold text-white">BolaStream <span class="text-emerald-400">Admin</span></h1>
            <div class="text-xs text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full bg-emerald-500/10">Sistem Aktif</div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                <h3 class="text-sm font-semibold text-white mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-gear text-emerald-400"></i> Pengaturan Siaran
                </h3>
                
                <form id="match-form" onsubmit="handleSubmit(event)" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">Link Video / Siaran</label>
                        <input type="url" id="match-m3u8" required placeholder="https://... (.m3u8 / .mpd / .mp4 / .webm)" 
                            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:border-emerald-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">Jadwal Pertandingan</label>
                        <textarea
                            id="match-jadwal"
                            rows="6"
                            placeholder="Contoh format:
Senin 20:00 WIB | Indonesia vs Malaysia
Selasa 18:30 WIB | Jepang vs Korea Selatan
Rabu 19:00 WIB | Vietnam vs Thailand"
                            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:border-emerald-500 outline-none"></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">Status Laga</label>
                        <select id="match-status" onchange="toggleCustomStatusInput()" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:border-emerald-500 outline-none">
                            <option value="LIVE STREAMING">LIVE STREAMING</option>
                            <option value="LIVE UPCOMING">LIVE UPCOMING</option>
                            <option value="CUSTOM">Silahkan ketik...</option>
                        </select>
                        <input type="text" id="match-status-custom" placeholder="Ketik status kustom di sini..." 
                            class="hidden mt-2 w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:border-emerald-500 outline-none">
                    </div>

                    <button type="submit" id="submit-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-semibold py-3 rounded-xl transition-all text-sm">
                        Simpan Perubahan
                    </button>
                </form>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 shadow-xl">
                <h3 class="text-sm font-semibold text-white mb-3">Preview Player</h3>
                <div class="aspect-video bg-black rounded-xl overflow-hidden border border-slate-800">
                    <video id="preview-video" controls class="w-full h-full"></video>
                </div>
            </div>
        </div>
    
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl mt-8">
            <h3 class="text-sm font-semibold text-white mb-2">👁️ Total Penonton</h3>
            <div id="totalPenonton" class="text-4xl font-bold text-emerald-400">0</div>
        </div>

    </main>

    <script>
        const APPS_SCRIPT_JADWAL = "https://script.google.com/macros/s/AKfycbxcCNo4yAx7p6Ri9Sky5jqWXKZpaLHPl7Bjhq4QJKbO6YAuvJPw70XSKp6Yp4NK5-ej/exec";
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOcPqHXEKv0MBN-dPr_XPj6PZTd3ql0Oml77xcFAKg8n1-0Cj3QFhJPBnihCKyTlv2-w/exec";
        const STATS_API = "https://script.google.com/macros/s/AKfycbxA16LzUziFJFDA76hJXa2lG-uk8KoDBOZNabF51QOvsu5PIDq10HdOH3BdORAKRlXK/exec";

        let hls = null;
        let dashPlayer = null;

        window.onload = () => {
            fetchData();
            muatJadwal();
            loadStats();
            setInterval(loadStats, 5000);
        };

        async function muatJadwal() {
            try {
                const res = await fetch(APPS_SCRIPT_JADWAL + "?action=get");
                const data = await res.json();
                document.getElementById("match-jadwal").value = data.jadwal || "";
            } catch (err) {
                console.error("Gagal memuat jadwal:", err);
            }
        }

        async function handleSubmit(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Menyimpan...";
            btn.disabled = true;

            const payloadUtama = {
                action: "update",
                m3u8: document.getElementById("match-m3u8").value.trim(),
                status: getStatusValue()
            };

            const payloadJadwal = {
                action: "updateJadwal",
                jadwal: document.getElementById("match-jadwal").value.trim()
            };

            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payloadUtama)
                });
                await fetch(APPS_SCRIPT_JADWAL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payloadJadwal)
                });
                alert("✅ Semua data berhasil disimpan!");
                fetchData();
            } catch (err) {
                alert("❌ Gagal menyimpan data");
                console.error(err);
            } finally {
                btn.innerText = "Simpan Perubahan";
                btn.disabled = false;
            }
        }

        async function fetchData() {
            try {
                const res = await fetch(APPS_SCRIPT_URL);
                const data = await res.json();
                const item = Array.isArray(data) ? data[0] : data;
                document.getElementById("match-m3u8").value = item.m3u8 || '';
                setStatusUI(item.status || '');
                playPreview(item.m3u8);
            } catch (err) { console.error("Gagal ambil data:", err); }
        }

        function setStatusUI(nilaiStatus) {
            const select = document.getElementById('match-status');
            const inputKustom = document.getElementById('match-status-custom');
            if (nilaiStatus === 'LIVE STREAMING' || nilaiStatus === 'LIVE UPCOMING') {
                select.value = nilaiStatus;
                inputKustom.classList.add('hidden');
            } else {
                select.value = 'CUSTOM';
                inputKustom.value = nilaiStatus;
                inputKustom.classList.remove('hidden');
            }
        }

        function toggleCustomStatusInput() {
            const select = document.getElementById('match-status');
            const inputKustom = document.getElementById('match-status-custom');
            inputKustom.classList.toggle('hidden', select.value !== 'CUSTOM');
            inputKustom.required = select.value === 'CUSTOM';
        }

        function getStatusValue() {
            const select = document.getElementById('match-status');
            return select.value === 'CUSTOM' ? document.getElementById('match-status-custom').value.trim() : select.value;
        }

        // ✅ PEMUTAR DUKUNG SEMUA FORMAT: M3U8, MPD, MP4, DLL
        function playPreview(url) {
            const video = document.getElementById('preview-video');
            if (!url) {
                resetPlayers();
                return;
            }

            resetPlayers();
            const urlLower = url.toLowerCase();

            // 1. Format DASH (.mpd)
            if (urlLower.includes('.mpd')) {
                if (dashjs.isSupported()) {
                    dashPlayer = dashjs.MediaPlayer().create();
                    dashPlayer.initialize(video, url, true);
                } else {
                    alert("Browser tidak mendukung format .mpd");
                }
            }

            // 2. Format HLS (.m3u8)
            else if (urlLower.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hls = new Hls({ enableWorker: true, lowLatencyMode: true });
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.ERROR, (e, data) => {
                        if (data.fatal) {
                            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                            else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                            else hls.destroy();
                        }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                } else {
                    alert("Browser tidak mendukung format .m3u8");
                }
            }

            // 3. Format file biasa (.mp4, .webm, .mov, dll)
            else {
                video.src = url;
                video.load();
            }
        }

        // Bersihkan pemutar sebelum ganti link
        function resetPlayers() {
            const video = document.getElementById('preview-video');
            if (hls) { hls.destroy(); hls = null; }
            if (dashPlayer) { dashPlayer.reset(); dashPlayer = null; }
            video.removeAttribute('src');
            video.load();
        }

        async function loadStats() {
            try {
                const res = await fetch(`${STATS_API}?action=stats`);
                const data = await res.json();
                document.getElementById('totalPenonton').textContent = data.total || 0;
            } catch (err) { console.error("Gagal muat statistik:", err); }
        }
    </script>
</body>
</html>
